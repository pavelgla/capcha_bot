<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Captcha Bot{% endblock %} — Admin Panel</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
  <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12/dist/ext/sse.js" crossorigin="anonymous"></script>
  <style>
    body { max-width: 960px; }
    nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: .75rem; flex-wrap: wrap; gap: .5rem; }
    nav strong { font-size: 1.1rem; }
    nav .nav-right { display: flex; gap: 1rem; align-items: center; }
    nav .nav-user { font-size: .9rem; opacity: .7; }
    .badge { display: inline-block; padding: .15em .5em; border-radius: 4px; font-size: .8rem; font-weight: bold; }
    .badge-ok { background: #2ecc71; color: #fff; }
    .badge-off { background: #e74c3c; color: #fff; }
    .badge-free { background: #95a5a6; color: #fff; }
    .badge-pro { background: #3498db; color: #fff; }
    .stat { font-weight: bold; }
    .flash { background: #2ecc7133; border: 1px solid #2ecc71; padding: .5rem 1rem; border-radius: 4px; margin-bottom: 1rem; }
    .flash-err { background: #e74c3c22; border: 1px solid #e74c3c; padding: .5rem 1rem; border-radius: 4px; margin-bottom: 1rem; color: #e74c3c; }
    #event-feed { max-height: 320px; overflow-y: auto; font-size: .85rem; }
    .ev-join    { color: #3498db; }
    .ev-pass    { color: #2ecc71; }
    .ev-fail    { color: #e74c3c; }
    .ev-timeout { color: #e67e22; }
    table { width: 100%; }
    td, th { vertical-align: middle; }
  </style>
</head>
<body>
  <nav>
    <strong>🤖 Captcha Bot — Admin Panel</strong>
    <div class="nav-right">
      {% if user %}
        <span class="nav-user">{{ user.username }}
          {% if user.role == 'superadmin' %}<span class="badge badge-pro">superadmin</span>{% endif %}
        </span>
        {% if user.role == 'superadmin' %}
          <a href="/admin/users">Пользователи</a>
        {% endif %}
        <a href="/account">Кабинет</a>
      {% endif %}
      <a href="/logout">Выйти</a>
    </div>
  </nav>
  {% block content %}{% endblock %}
</body>
</html>
