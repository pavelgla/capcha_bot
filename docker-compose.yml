services:

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - ./redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  captcha_bot:
    build: ./captcha_bot
    restart: always
    env_file: ./captcha_bot/.env
    depends_on:
      redis:
        condition: service_healthy

