services:

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - ./redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  captcha_bot:
    build: ./captcha_bot
    restart: always
    env_file: ./captcha_bot/.env
    depends_on:
      redis:
        condition: service_healthy

  captcha_web:
    build: ./captcha_bot
    restart: always
    command: ["uvicorn", "web.app:app", "--host", "0.0.0.0", "--port", "3003"]
    env_file: ./captcha_bot/.env
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - /opt/runstart/certbot/conf:/etc/letsencrypt:ro
    depends_on:
      - captcha_web
    networks:
      - default
      - midgard_net

networks:
  default:
  midgard_net:
    external: true
    name: sites_default
