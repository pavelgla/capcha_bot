services:

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - ./redis/data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  captcha_bot:
    build: ./captcha_bot
    restart: always
    env_file: ./captcha_bot/.env
    depends_on:
      redis:
        condition: service_healthy

  captcha_web:
    build: ./captcha_bot
    restart: always
    command: ["uvicorn", "web.app:app", "--host", "0.0.0.0", "--port", "8080"]
    env_file: ./captcha_bot/.env
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      redis:
        condition: service_healthy
