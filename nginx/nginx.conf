# --- estelad.console10.ru → midgard game (8080) ---
server {
    listen 80;
    server_name estelad.console10.ru;

    location /.well-known/acme-challenge/ {
        proxy_pass http://172.18.0.1:8080;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name estelad.console10.ru;

    ssl_certificate /etc/letsencrypt/live/estelad.console10.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/estelad.console10.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 10m;

    location / {
        proxy_pass http://172.18.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# --- new.runstart.ru → runstart nginx (8080) ---
server {
    listen 443 ssl;
    server_name new.runstart.ru;

    ssl_certificate /etc/letsencrypt/live/new.runstart.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/new.runstart.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 50m;

    location / {
        proxy_pass http://172.18.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

# --- captcha (catch-all) ---
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/cert.crt;
    ssl_certificate_key /etc/nginx/ssl/cert.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://captcha_web:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        proxy_pass http://172.18.0.1:8080;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
